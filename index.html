<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>נגריית המרץ – אהרון מרגני</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root {
  --wood-dark: #3D1F0D; --wood-mid: #7B3F1A; --wood-light: #C4813A;
  --cream: #FDF6EC; --text-dark: #2A1505; --gold: #B8860B;
}
body{font-family:'Heebo',sans-serif;background:var(--cream);color:var(--text-dark)}

/* תיקון תצוגת התמונות */
.product-gallery{height:300px;position:relative;overflow:hidden;background:var(--cream);display:flex;align-items:center;justify-content:center}
.product-gallery img{width:100%;height:100%;object-fit:contain;padding:10px}

.section{padding:5rem 2rem}
.products-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:2rem}
.product-card{background:#fff;border-radius:8px;overflow:hidden;border:1px solid #ddd;display:flex;flex-direction:column}
.product-body{padding:1.5rem}
.product-order-btn{width:100%;background:var(--wood-dark);color:#fff;border:none;padding:12px;border-radius:4px;cursor:pointer;margin-top:1rem}
.product-order-btn:hover{background:var(--wood-mid)}
</style>
</head>
<body>

<section class="section" id="products">
  <div class="products-grid">
    <div class="product-card">
      <div class="product-gallery">
        <img src="ELYAHU_1.jpeg" alt="כיסא אליהו הנביא">
      </div>
      <div class="product-body">
        <h3>כיסא אליהו הנביא</h3>
        <button class="product-order-btn" onclick="openOrderModal('כיסא אליהו הנביא')">פרטים והזמנה</button>
      </div>
    </div>
  </div>
</section>

<div id="order-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center">
  <div style="background:#fff; padding:2rem; border-radius:8px; width:90%; max-width:400px; position:relative">
    <button onclick="closeModal()" style="position:absolute; top:10px; left:10px; border:none; background:none; cursor:pointer">X</button>
    <h2 id="modal-title">הזמנה</h2>
    <input type="text" id="mname" placeholder="שם מלא" style="width:100%; margin:10px 0; padding:10px">
    <input type="tel" id="mphone" placeholder="טלפון" style="width:100%; margin:10px 0; padding:10px">
    <button onclick="sendWhatsApp()" style="width:100%; padding:10px; background:#25D366; color:#fff; border:none; cursor:pointer">שלח הודעה ב-WhatsApp</button>
  </div>
</div>

<script>
var selectedProduct = "";

function openOrderModal(product) {
    selectedProduct = product;
    document.getElementById('modal-title').innerText = "הזמנה: " + product;
    document.getElementById('order-modal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('order-modal').style.display = 'none';
}

function sendWhatsApp() {
    var name = document.getElementById('mname').value;
    var phone = document.getElementById('mphone').value;
    var msg = "שלום, אני מעוניין ב-" + selectedProduct + ". שמי: " + name + ", טלפון: " + phone;
    var url = "https://wa.me/972506810291?text=" + encodeURIComponent(msg);
    window.open(url, '_blank');
}
</script>

</body>
</html>

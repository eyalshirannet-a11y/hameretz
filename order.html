<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><link rel="stylesheet" href="style.css"></head>
<body><div class="page-container">
<nav><a href="index.html" style="color:#E8C89A;text-decoration:none;font-size:1.8rem;font-weight:bold;">נגריית המרץ</a>
<div class="nav-links"><a href="index.html">בית</a><a href="about.html">אודות</a><a href="order.html">הזמנה</a><a href="contact.html">צור קשר</a></div></nav>
<div class="content">
  <h1>הזמנה מותאמת אישית</h1>
  <select id="itemSelect"><option>כיסא אליהו</option><option>שולחן עץ מלא</option><option>כורסה מעוצבת</option><option>ארון קודש</option></select>
  <input type="text" id="name" placeholder="שם מלא">
  <input type="tel" id="phone" placeholder="טלפון">
  <textarea id="notes" rows="4" placeholder="פירוט נוסף או מידות"></textarea>
  <button onclick="sendWA()">שלח הזמנה בוואטסאפ</button>
</div>
<script>
function sendWA() { 
  var item = document.getElementById('itemSelect').value;
  var name = document.getElementById('name').value;
  var notes = document.getElementById('notes').value;
  window.open('https://wa.me/972506810291?text=הזמנה עבור: ' + item + '%0Aשם: ' + name + '%0Aהערות: ' + notes); 
}
</script>
</div></body></html>

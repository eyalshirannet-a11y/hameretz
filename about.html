  <h1>אודות אהרון מרגני</h1>
  <p>מאחורי נגריית המרץ עומד אהרון מרגני, נגר בעל ותק רב שרואה בעץ לא רק חומר גלם, אלא אומנות.</p>
  <p>הנגרייה שלנו דוגלת בשימוש בעץ איכותי בלבד, טכניקות מסורתיות משולבות בטכנולוגיה מודרנית כדי להבטיח שהרהיט שלכם לא רק ייראה מצוין, אלא גם יחזיק מעמד דורות.</p>
